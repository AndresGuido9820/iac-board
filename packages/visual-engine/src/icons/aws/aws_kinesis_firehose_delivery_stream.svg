<?xml version="1.0" encoding="UTF-8"?>
<svg width="64px" height="64px" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#E7157B"/>
  <!-- Firehose: pipe/stream with fire delivering to destination -->
  <!-- Source (left) -->
  <circle cx="12" cy="32" r="8" fill="#FFFFFF"/>
  <rect x="10" y="29" width="4" height="6" rx="1" fill="#E7157B" opacity="0.5"/>
  <!-- Delivery pipe (middle) -->
  <rect x="20" y="28" width="24" height="8" rx="4" fill="#FFFFFF"/>
  <!-- Flow dots -->
  <circle cx="26" cy="32" r="2" fill="#E7157B" opacity="0.4"/>
  <circle cx="32" cy="32" r="2" fill="#E7157B" opacity="0.6"/>
  <circle cx="38" cy="32" r="2" fill="#E7157B" opacity="0.8"/>
  <!-- Destination (right - S3 bucket suggestion) -->
  <ellipse cx="53" cy="26" rx="9" ry="4" fill="#FFFFFF"/>
  <rect x="44" y="26" width="18" height="14" fill="#FFFFFF"/>
  <ellipse cx="53" cy="40" rx="9" ry="4" fill="#FFFFFF"/>
  <!-- Fire flame (delivery speed) -->
  <path d="M30,16 Q32,10 34,14 Q35,8 38,12 Q40,6 32,4 Q24,6 26,12 Q28,8 30,16 Z" fill="#FFFFFF" opacity="0.7"/>
</svg>
